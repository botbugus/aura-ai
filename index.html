<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkTree - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Area Home - Tengah -->
        <div id="home-section" class="main-section">
            <div id="links-container">
                <h2>Tautan Anda</h2>
                <div id="user-links"></div>
                <button onclick="showAddLinkForm()">+ Tambah Tautan</button>
            </div>
            <div id="add-link-form" style="display: none;">
                <input type="text" id="link-title" placeholder="Judul Tautan">
                <input type="url" id="link-url" placeholder="URL Tautan">
                <input type="text" id="link-icon" placeholder="Icon (emoji/kelas FontAwesome)">
                <button onclick="addLink()">Simpan</button>
                <button onclick="cancelAddLink()">Batal</button>
            </div>
        </div>

        <!-- Area Beranda - Kiri Bawah (Preview Publik) -->
        <div id="beranda-section" class="bottom-left-section" style="display: none;">
            <h3>Pratinjau Halaman Publik</h3>
            <div id="public-preview"></div>
            <button onclick="closeBeranda()">Tutup</button>
        </div>

        <!-- Area Profil - Bawah -->
        <div id="profile-section" class="bottom-section">
            <h3>Pengaturan Profil</h3>
            <input type="text" id="display-name" placeholder="Nama Tampilan">
            <textarea id="bio" placeholder="Bio singkat"></textarea>
            <input type="url" id="photo-url" placeholder="URL Foto Profil">
            <button onclick="saveProfile()">Simpan Profil</button>
            <button onclick="logout()">Keluar</button>
        </div>

        <!-- Navigasi Sosial Media -->
        <div id="social-media-section" class="social-section">
            <h3>Media Sosial</h3>
            <div id="social-links"></div>
            <button onclick="showAddSocialForm()">+ Tambah Media Sosial</button>
        </div>

        <!-- Tombol Tampil Beranda -->
        <button id="toggle-beranda" class="beranda-toggle" onclick="toggleBeranda()">Beranda</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
